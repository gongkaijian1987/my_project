version: 2.1

jobs:
  parallel_test_verification:
    docker:
      - image: maven:3.8.8-eclipse-temurin-8
    resource_class: medium
    parallelism: 4
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-jdk8-v1-{{ checksum "pom.xml" }}
            - maven-jdk8-v1-
      - run:
          name: Run split test suite in parallel
          command: |
            chmod +x scripts/run-circleci-parallel-tests.sh
            ./scripts/run-circleci-parallel-tests.sh
      - store_test_results:
          path: target/surefire-reports

  package_application:
    docker:
      - image: maven:3.8.8-eclipse-temurin-8
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-jdk8-v1-{{ checksum "pom.xml" }}
            - maven-jdk8-v1-
      - run:
          name: Package Spring Boot application
          command: mvn -B -ntp package -DskipTests
      - save_cache:
          key: maven-jdk8-v1-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
      - store_artifacts:
          path: target/springboot-circleci-demo-0.0.1-SNAPSHOT.jar

  deploy_snapshot:
    docker:
      - image: cimg/base:stable
    resource_class: small
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Simulate deployment
          command: |
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

workflows:
  ci_cd:
    jobs:
      - parallel_test_verification
      - package_application:
          requires:
            - parallel_test_verification
      - deploy_snapshot:
          requires:
            - package_application
          filters:
            branches:
              only:
                - main
