version: 2.1

jobs:
  automated_verification:
    docker:
      - image: maven:3.8.8-eclipse-temurin-8
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Install git
          command: |
            apt-get update
            apt-get install -y git
      - run:
          name: Analyze changed files and build verification plan
          command: |
            chmod +x scripts/verification-plan.sh
            ./scripts/verification-plan.sh
      - restore_cache:
          keys:
            - maven-v1-{{ checksum "pom.xml" }}
            - maven-v1-
      - run:
          name: Run automated verification
          command: |
            chmod +x scripts/run-automated-verification.sh
            ./scripts/run-automated-verification.sh
      - save_cache:
          paths:
            - ~/.m2
          key: maven-v1-{{ checksum "pom.xml" }}
      - store_test_results:
          path: target/surefire-reports
      - store_artifacts:
          path: target/verification
      - store_artifacts:
          path: target/springboot-circleci-demo-0.0.1-SNAPSHOT.jar

  deploy_snapshot:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project
    steps:
      - checkout
      - run:
          name: Plan deployment
          command: |
            circleci run release plan "${CIRCLE_JOB}" \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      - run:
          name: Simulate deployment
          command: |
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail

workflows:
  ci_cd:
    jobs:
      - automated_verification
      - deploy_snapshot:
          requires:
            - automated_verification
          filters:
            branches:
              only:
                - main
